<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges" image-rendering="pixelated">
  <g id="WindowsTerminalZFixedIcon">
    <!-- Jendela Konsol / Bingkai Luar Terminal Windows (Abu-abu Gelap #767676) -->
    <rect x="0" y="0" width="16" height="3" fill="#767676" /> <!-- Title Bar -->
    <rect x="0" y="3" width="1" height="13" fill="#767676" /> <!-- Bingkai Kiri -->
    <rect x="15" y="3" width="1" height="13" fill="#767676" /> <!-- Bingkai Kanan -->
    <rect x="0" y="15" width="16" height="1" fill="#767676" /> <!-- Bingkai Bawah -->
    
    <!-- Aksen Tombol Close Kecil di Title Bar (Warna Hitam Terminal) -->
    <rect x="13" y="1" width="1" height="1" fill="#0c0c0d" />
    
    <!-- Layar Dalam Terminal (Hitam Pekat ala Windows Terminal #0c0c0d) -->
    <rect x="1" y="3" width="14" height="12" fill="#0c0c0d" />
    
    <!-- ========================================== -->
    <!-- TEKS TERMINAL: 'Z_'                        -->
    <!-- ========================================== -->
    
    <!-- Huruf 'Z' yang Dikuruskan (Merah Retro Menyala #ff3b30) -->
    <rect x="3" y="5" width="5" height="1" fill="#ff3b30" /> <!-- Bar Atas Z (1px) -->
    <rect x="7" y="6" width="1" height="1" fill="#ff3b30" /> <!-- Diagonal Atas -->
    <rect x="6" y="7" width="1" height="1" fill="#ff3b30" /> <!-- Diagonal Tengah -->
    <rect x="5" y="8" width="1" height="1" fill="#ff3b30" /> <!-- Diagonal Tengah -->
    <rect x="4" y="9" width="1" height="1" fill="#ff3b30" /> <!-- Diagonal Bawah -->
    <rect x="3" y="10" width="5" height="1" fill="#ff3b30" /> <!-- Bar Bawah Z (1px) -->
    
    <!-- Kursor Underscore '_' Khas CLI Windows (Putih Bersih #ffffff) -->
    <!-- Diletakkan sebaris dengan bagian bawah Z (x=9, y=10) -->
    <rect x="9" y="10" width="3" height="1" fill="#ffffff" />
  </g>
</svg>
